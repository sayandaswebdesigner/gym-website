<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:400,800');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* --- THE UPDATED BACKGROUND --- */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
        }

        h1 { font-weight: bold; margin: 0; }
        p { font-size: 14px; font-weight: 100; line-height: 20px; letter-spacing: 0.5px; margin: 20px 0 30px; }
        span { font-size: 12px; }

        /* The Main Container */
        .container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22);
            position: relative;
            overflow: hidden;
            width: 768px;
            max-width: 100%;
            min-height: 480px;
        }

        /* Form Styling */
        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
        }
        form {
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 50px;
            height: 100%;
            text-align: center;
        }
        input {
            background-color: #eee;
            border: none;
            padding: 12px 15px;
            margin: 8px 0;
            width: 100%;
            border-radius: 5px;
        }
        button {
            border-radius: 20px;
            border: 1px solid #ff4b2b;
            background-color: #ff4b2b;
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            padding: 12px 45px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: transform 80ms ease-in;
            cursor: pointer;
            margin-top: 15px;
        }
        button:active { transform: scale(0.95); }
        button:focus { outline: none; }
        button.ghost {
            background-color: transparent;
            border-color: #ffffff;
        }

        /* Animation Logic */
        .sign-in-container {
            left: 0;
            width: 50%;
            z-index: 2;
        }
        .container.right-panel-active .sign-in-container { transform: translateX(100%); }

        .sign-up-container {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }
        .container.right-panel-active .sign-up-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: show 0.6s;
        }
        @keyframes show {
            0%, 49.99% { opacity: 0; z-index: 1; }
            50%, 100% { opacity: 1; z-index: 5; }
        }

        /* Overlay Sliding Panel Styling */
        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.6s ease-in-out;
            z-index: 100;
        }
        .container.right-panel-active .overlay-container { transform: translateX(-100%); }

        .overlay {
            background: #ff416c;
            background: -webkit-linear-gradient(to right, #ff4b2b, #ff416c);
            background: linear-gradient(to right, #ff4b2b, #ff416c);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: 0 0;
            color: #ffffff;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }
        .container.right-panel-active .overlay { transform: translateX(50%); }

        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }
        .overlay-left {
            transform: translateX(-20%);
        }
        .container.right-panel-active .overlay-left { transform: translateX(0); }
        .overlay-right {
            right: 0;
            transform: translateX(0);
        }
        .container.right-panel-active .overlay-right { transform: translateX(20%); }

        /* --- UPDATED SYSTEM MESSAGE FOR DARK BACKGROUND --- */
        #system-message {
            margin-top: 20px;
            font-weight: bold;
            color: #ffffff;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        
        <div class="form-container sign-up-container">
            <form id="signup-form">
                <h1>Create Account</h1>
                <span>with your email for registration</span>
                <input type="text" id="signup-username" placeholder="Username" required />
                <input type="password" id="signup-password" placeholder="Password" required />
               <select id="signup-plan" title="Choose your gym plan">
                    <option value="free">Free Tier ($0/mo)</option>
                    <option value="pro">Pro Membership ($50/mo)</option>
                </select>
                <button type="submit">Sign Up</button>
            </form>
        </div>

        <div class="form-container sign-in-container">
            <form id="signin-form">
                <h1>Sign in</h1>
                <span>with your account</span>
                <input type="text" id="signin-username" placeholder="Username" required />
                <input type="password" id="signin-password" placeholder="Password" required />
                <button type="submit">Sign In</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <button class="ghost" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Friend!</h1>
                    <p>Enter your personal details and start journey with us</p>
                    <button class="ghost" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <div id="system-message"></div>

    <script>
        // 1. UI Animation Logic
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');
        const messageBox = document.getElementById('system-message');

        // Add/remove the class that triggers the CSS slider animation
        signUpButton.addEventListener('click', () => {
            container.classList.add("right-panel-active");
            messageBox.innerText = ""; // Clear messages on slide
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove("right-panel-active");
            messageBox.innerText = ""; // Clear messages on slide
        });
// 2. Backend Connection Logic
        async function authenticateUser(endpoint, user, pass) {
            try {
               const response = await fetch(`https://gym-website-29il.onrender.com/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();
                
                if (response.ok && endpoint === '/login') {
                    if (data.role === 'owner') {
                        // INSTANT REDIRECT: No message, just boom, straight to the dashboard.
                        window.location.href = 'dashboard.html';
                    } else {
                        // Regular members still get a welcome message (since we haven't built a member page yet!)
                        messageBox.innerText = "Welcome to the Member Area!";
                    }
                } else {
                    // Show success for sign up, or errors for bad passwords
                    messageBox.innerText = data.message;
                }
            } catch (error) {
                messageBox.innerText = "Error connecting to the server. Is server.js running?";
            }
        }

        

        // Listen for Form Submissions
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault(); 
            const user = document.getElementById('signup-username').value;
            const pass = document.getElementById('signup-password').value;
            const plan = document.getElementById('signup-plan').value; // Get the chosen plan
            
            // We need a slightly different fetch call just for sign up now so we can send the plan
            fetch('https://gym-website-29il.onrender.com/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass, plan: plan }) // Send plan to backend
            })
            .then(res => res.json())
            .then(data => {
                messageBox.innerText = data.message;
            })
            .catch(err => {
                messageBox.innerText = "Error connecting to the server.";
            });
        });
    </script>
</body>
</html>
